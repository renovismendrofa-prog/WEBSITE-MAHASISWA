<!DOCTYPE html>
<html lang="id">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>{% block title %}Dashboard Academic{% endblock %}</title>
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/@tabler/icons-webfont@3.19.0/dist/tabler-icons.min.css">
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    :root {
      --bg:       #f4f5f7;
      --surface:  #ffffff;
      --surface2: #f8f9fa;
      --border:   #e5e7eb;
      --border2:  #d1d5db;
      --text:     #111827;
      --muted:    #6b7280;
      --hint:     #9ca3af;
      --blue:     #185FA5;
      --blue-bg:  #eff6ff;
      --blue-bd:  #bfdbfe;
      --blue-text:#1e40af;
      --red:      #A32D2D;
      --red-bg:   #fef2f2;
      --red-bd:   #fecaca;
      --green:    #3B6D11;
      --green-bg: #f0fdf4;
      --green-bd: #bbf7d0;
      --amber:    #854F0B;
      --amber-bg: #fffbeb;
      --amber-bd: #fde68a;
      --radius:   8px;
      --radius-lg:12px;
    }

    body {
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
      background: var(--bg);
      color: var(--text);
      font-size: 14px;
      line-height: 1.5;
      min-height: 100vh;
    }

    /* ── Navbar ── */
    .navbar {
      background: var(--surface);
      border-bottom: 1px solid var(--border);
      height: 52px;
      display: flex;
      align-items: center;
      justify-content: space-between;
      padding: 0 24px;
      position: sticky;
      top: 0;
      z-index: 100;
    }
    .nav-brand {
      display: flex; align-items: center; gap: 8px;
      font-size: 15px; font-weight: 600; color: var(--text);
      text-decoration: none;
    }
    .nav-brand i { color: var(--blue); font-size: 20px; }
    .nav-right { display: flex; align-items: center; gap: 10px; }
    .log-badge {
      background: var(--surface2); border: 1px solid var(--border);
      border-radius: var(--radius); padding: 5px 12px;
      font-size: 12px; color: var(--muted);
      display: flex; align-items: center; gap: 6px;
      max-width: 420px; overflow: hidden; white-space: nowrap; text-overflow: ellipsis;
    }
    .log-badge i { color: var(--hint); font-size: 13px; flex-shrink: 0; }

    /* ── Buttons ── */
    .btn {
      display: inline-flex; align-items: center; gap: 6px;
      border-radius: var(--radius); padding: 7px 14px;
      font-size: 13px; font-weight: 500; cursor: pointer;
      border: 1px solid transparent; text-decoration: none;
      transition: background .15s, border-color .15s;
      white-space: nowrap;
    }
    .btn i { font-size: 15px; }
    .btn-primary { background: var(--blue); color: #fff; border-color: var(--blue); }
    .btn-primary:hover { background: #0C447C; border-color: #0C447C; }
    .btn-ghost {
      background: var(--surface); color: var(--muted);
      border-color: var(--border);
    }
    .btn-ghost:hover { color: var(--text); border-color: var(--border2); background: var(--surface2); }
    .btn-danger { background: var(--red-bg); color: var(--red); border-color: var(--red-bd); }
    .btn-danger:hover { background: #fee2e2; }
    .btn-sm { padding: 4px 10px; font-size: 12px; }
    .btn-sm i { font-size: 13px; }

    /* ── Flash messages ── */
    .flash-wrap { padding: 12px 24px 0; }
    .flash {
      display: flex; align-items: center; gap: 8px;
      padding: 10px 14px; border-radius: var(--radius);
      font-size: 13px; margin-bottom: 6px;
    }
    .flash-success { background: var(--green-bg); color: var(--green); border: 1px solid var(--green-bd); }
    .flash-error   { background: var(--red-bg);   color: var(--red);   border: 1px solid var(--red-bd); }

    /* ── Page wrapper ── */
    .page { max-width: 1200px; margin: 0 auto; padding: 20px 24px 40px; }

    /* ── Cards ── */
    .card {
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: var(--radius-lg);
      padding: 20px;
    }

    /* ── Scrollbar ── */
    ::-webkit-scrollbar { width: 6px; height: 6px; }
    ::-webkit-scrollbar-track { background: transparent; }
    ::-webkit-scrollbar-thumb { background: var(--border2); border-radius: 3px; }

    {% block extra_style %}{% endblock %}
  </style>
</head>
<body>

<nav class="navbar">
  <a class="nav-brand" href="{{ url_for('index') }}">
    <i class="ti ti-school"></i>
    Dashboard Academic Terpadu
  </a>
  <div class="nav-right">
    {% block nav_extra %}{% endblock %}
    <a href="{{ url_for('logout') }}" class="btn btn-ghost">
      <i class="ti ti-logout"></i> Log out
    </a>
  </div>
</nav>

{% with messages = get_flashed_messages(with_categories=True) %}
  {% if messages %}
    <div class="flash-wrap">
      {% for cat, msg in messages %}
        <div class="flash flash-{{ cat if cat != 'message' else 'success' }}">
          <i class="ti ti-{{ 'circle-check' if (cat == 'success' or cat == 'message') else 'alert-circle' }}"></i>
          {{ msg }}
        </div>
      {% endfor %}
    </div>
  {% endif %}
{% endwith %}

{% block content %}{% endblock %}

</body>
</html>
