<!DOCTYPE html>
<html lang="id">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Login — Dashboard Academic</title>
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/@tabler/icons-webfont@3.19.0/dist/tabler-icons.min.css">
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    :root {
      --blue: #185FA5; --blue-dark: #0C447C;
      --border: #e5e7eb; --border2: #d1d5db;
      --text: #111827; --muted: #6b7280; --hint: #9ca3af;
      --red: #A32D2D; --red-bg: #fef2f2; --red-bd: #fecaca;
      --surface: #ffffff; --bg: #f4f5f7;
      --radius: 8px; --radius-lg: 12px;
    }
    body {
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
      background: var(--bg); color: var(--text);
      min-height: 100vh; display: flex;
      align-items: center; justify-content: center;
      padding: 24px;
    }
    .login-wrap {
      width: 100%; max-width: 380px;
    }
    .brand {
      text-align: center; margin-bottom: 28px;
    }
    .brand-icon {
      width: 52px; height: 52px;
      background: var(--blue); border-radius: 14px;
      display: flex; align-items: center; justify-content: center;
      margin: 0 auto 12px;
    }
    .brand-icon i { color: #fff; font-size: 28px; }
    .brand h1 { font-size: 18px; font-weight: 600; }
    .brand p  { font-size: 13px; color: var(--muted); margin-top: 4px; }

    .card {
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: var(--radius-lg);
      padding: 28px 28px 24px;
    }

    .form-group { margin-bottom: 16px; }
    .form-label {
      display: block; font-size: 12px; font-weight: 500;
      color: var(--muted); margin-bottom: 6px; letter-spacing: .03em;
      text-transform: uppercase;
    }
    .input-wrap { position: relative; }
    .input-wrap > i {
      position: absolute; left: 11px; top: 50%;
      transform: translateY(-50%);
      font-size: 16px; color: var(--hint); pointer-events: none;
    }
    .form-input {
      width: 100%;
      background: var(--bg); border: 1px solid var(--border);
      border-radius: var(--radius); padding: 9px 38px 9px 36px;
      font-size: 14px; color: var(--text);
      transition: border-color .15s, background .15s;
      outline: none; font-family: inherit;
    }
    .form-input:focus {
      border-color: var(--blue);
      background: #fff;
      box-shadow: 0 0 0 3px rgba(24,95,165,.1);
    }
    .input-toggle {
      position: absolute; right: 10px; top: 50%;
      transform: translateY(-50%);
      background: none; border: none; cursor: pointer;
      color: var(--hint); padding: 4px; font-size: 18px;
      z-index: 2; line-height: 1; display: flex; align-items: center;
    }
    .input-toggle:hover { color: var(--muted); }

    .error-box {
      background: var(--red-bg); border: 1px solid var(--red-bd);
      border-radius: var(--radius); padding: 10px 14px;
      font-size: 13px; color: var(--red);
      display: flex; align-items: center; gap: 8px;
      margin-bottom: 16px;
    }

    .btn-login {
      width: 100%; background: var(--blue);
      border: none; border-radius: var(--radius);
      padding: 10px; font-size: 14px; font-weight: 600;
      color: #fff; cursor: pointer;
      display: flex; align-items: center; justify-content: center; gap: 8px;
      transition: background .15s; font-family: inherit;
      margin-top: 4px;
    }
    .btn-login:hover { background: var(--blue-dark); }
    .btn-login i { font-size: 16px; }

    .hint-box {
      margin-top: 16px;
      background: var(--bg); border: 1px solid var(--border);
      border-radius: var(--radius); padding: 10px 14px;
      font-size: 12px; color: var(--muted);
      display: flex; align-items: center; gap: 8px;
    }
    .hint-box i { color: var(--hint); font-size: 14px; flex-shrink: 0; }
    code {
      font-family: "SF Mono", "Fira Code", monospace;
      background: var(--border); border-radius: 4px;
      padding: 1px 5px; font-size: 11px;
    }
  </style>
</head>
<body>

<div class="login-wrap">
  <div class="brand">
    <div class="brand-icon"><i class="ti ti-school"></i></div>
    <h1>Dashboard Academic Terpadu</h1>
    <p>Masuk untuk mengakses data akademik</p>
  </div>

  <div class="card">
    {% with messages = get_flashed_messages() %}
      {% if messages %}
        {% for msg in messages %}
          <div class="error-box">
            <i class="ti ti-alert-circle"></i> {{ msg }}
          </div>
        {% endfor %}
      {% endif %}
    {% endwith %}

    <form method="POST" action="{{ url_for('login') }}">
      <div class="form-group">
        <label class="form-label" for="username">Username</label>
        <div class="input-wrap">
          <i class="ti ti-user"></i>
          <input class="form-input" type="text" id="username" name="username"
                 placeholder="Admin atau NIM (12 digit)" autocomplete="username" required>
        </div>
      </div>

      <div class="form-group">
        <label class="form-label" for="password">Password</label>
        <div class="input-wrap">
          <i class="ti ti-lock"></i>
          <input class="form-input" type="password" id="password" name="password"
                 placeholder="Masukkan password" autocomplete="current-password" required>
          <button type="button" class="input-toggle" id="toggle-pw" aria-label="Tampilkan password">
            <i class="ti ti-eye" id="toggle-icon"></i>
          </button>
        </div>
      </div>

      <button type="submit" class="btn-login">
        <i class="ti ti-login"></i> Masuk
      </button>
    </form>
  </div>
</div>

<script>
  const pw   = document.getElementById("password");
  const icon = document.getElementById("toggle-icon");
  document.getElementById("toggle-pw").addEventListener("click", () => {
    const isHidden = pw.type === "password";
    pw.type = isHidden ? "text" : "password";
    icon.classList.remove("ti-eye", "ti-eye-off");
    icon.classList.add(isHidden ? "ti-eye" : "ti-eye-off");
  });
</script>
</body>
</html>
